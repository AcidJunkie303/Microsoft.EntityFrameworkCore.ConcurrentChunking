name: CI/CD

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-pack-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Read version from version.json
        id: version
        shell: bash
        run: |
          VERSION_JSON="version.json"

          MAJOR=$(jq -r '.version.major' "$VERSION_JSON")
          MINOR=$(jq -r '.version.minor' "$VERSION_JSON")
          PATCH=$(jq -r '.version.patch' "$VERSION_JSON")
          IS_PRERELEASE=$(jq -r '.isPreRelease' "$VERSION_JSON")

          BASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          ASSEMBLY_VERSION="${MAJOR}.${MINOR}.${PATCH}.0"
          FILE_VERSION="${MAJOR}.${MINOR}.${PATCH}.${GITHUB_RUN_NUMBER}"

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            PACKAGE_VERSION="${BASE_VERSION}-prerelease.${GITHUB_RUN_NUMBER}"
          else
            PACKAGE_VERSION="${BASE_VERSION}"
          fi

          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "assembly_version=$ASSEMBLY_VERSION" >> "$GITHUB_OUTPUT"
          echo "file_version=$FILE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ./src

      - name: Build
        run: >
          dotnet build --no-restore --configuration Release
          /p:Version=${{ steps.version.outputs.base_version }}
          /p:AssemblyVersion=${{ steps.version.outputs.assembly_version }}
          /p:FileVersion=${{ steps.version.outputs.file_version }}
          /p:InformationalVersion=${{ steps.version.outputs.package_version }}
        working-directory: ./src

      - name: "Test: ConcurrentChunking.Tests"
        run: dotnet test --no-build --configuration Release --verbosity normal
        working-directory: ./src/tests/ConcurrentChunking.Tests

      - name: "Test: ConcurrentChunking.DependencyInjection.Tests"
        run: dotnet test --no-build --configuration Release --verbosity normal
        working-directory: ./src/tests/ConcurrentChunking.DependencyInjection.Tests

      - name: "Test: ConcurrentChunking.Linq.Tests"
        run: dotnet test --no-build --configuration Release --verbosity normal
        working-directory: ./src/tests/ConcurrentChunking.Linq.Tests

      - name: "Test: ConcurrentChunking.IntegrationTests"
        run: dotnet test --no-build --configuration Release --verbosity normal
        working-directory: ./src/tests/ConcurrentChunking.IntegrationTests

      - name: "Test: ConcurrentChunking.Linq.IntegrationTests"
        run: dotnet test --no-build --configuration Release --verbosity normal
        working-directory: ./src/tests/ConcurrentChunking.Linq.IntegrationTests

      - name: Pack NuGet package
        run: >
          dotnet pack --no-build --configuration Release
          /p:PackageVersion=${{ steps.version.outputs.package_version }}
        working-directory: ./src

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./src/**/*.nupkg

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: >
          dotnet nuget push ./**/*.nupkg
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ secrets.NUGET_API_KEY }}
          --skip-duplicate
        working-directory: ./src